# Global defaults (can be overridden per dataset)
defaults:
  schema: POC_RAW
  s3_bucket: lms-poc-sashank-101
  root_prefix: raw                 # datasets live under raw/<dataset>/<YYYY-MM-DD>/
  format: csv                      # csv | json | parquet
  header: true                     # CSV header present?
  delimiter: ","                   # CSV delimiter
  compression: none                # none | gzip
  required: true                   # if true and no files for date -> fail; else skip dataset
  copy_options:                    # applied to all datasets unless overridden
    - TRUNCATECOLUMNS
    - BLANKSASNULL
    - EMPTYASNULL
    - TIMEFORMAT 'auto'

datasets:
  users:
    # table name defaults to dataset name ("users"); override with 'table:' if different
    required: false  # users dataset is optional; if missing for a date, the DAG will still run and load other datasets
    columns:
      - { name: user_id,    type: varchar(64) }
      - { name: name,       type: varchar(256) }
      - { name: country,    type: char(2) }
      - { name: created_at, type: timestamp }
    # inherits csv/header/delimiter/etc from defaults

  # ENROLLMENTS
  # -----------------------------
  enrollments:
    required: false
    columns:
      - { name: enrollment_id,     type: varchar(64) }
      - { name: user_id,           type: varchar(64) }
      - { name: course_id,         type: varchar(64) }
      - { name: enrolled_at,       type: timestamp }
      - { name: enrollment_source, type: varchar(64) }
  # enrollments:
  #   columns:
  #     - { name: enrollment_id, type: varchar(64) }
  #     - { name: user_id,       type: varchar(64) }
  #     - { name: course_id,     type: varchar(64) }
  #     - { name: status,        type: varchar(32) }
  #     - { name: enrolled_at,   type: timestamp }

  # COURSES
  # -----------------------------
  courses:
    required: false
    columns:
      - { name: course_id,   type: varchar(64) }
      - { name: title,       type: varchar(256) }
      - { name: category,    type: varchar(128) }
      - { name: difficulty,  type: varchar(64) }
      - { name: created_at,  type: timestamp }
  events:
    required: false
    format: json
    columns:
      - { name: payload, type: super }

  # courses:
